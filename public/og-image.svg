<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0603"/>
      <stop offset="50%" style="stop-color:#1a0804"/>
      <stop offset="100%" style="stop-color:#2c1008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8813a"/>
      <stop offset="100%" style="stop-color:#d4a060"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c8813a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c8813a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a060;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#d4a060;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orb decorations -->
  <ellipse cx="150" cy="150" rx="320" ry="280" fill="url(#orb1)"/>
  <ellipse cx="1080" cy="520" rx="260" ry="220" fill="url(#orb2)"/>
  <ellipse cx="900" cy="80" rx="180" ry="140" fill="url(#orb1)" opacity="0.5"/>

  <!-- Divider lines -->
  <line x1="100" y1="310" x2="420" y2="310" stroke="#d4a060" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="780" y1="310" x2="1100" y2="310" stroke="#d4a060" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Eyebrow -->
  <text x="600" y="210" font-family="Georgia,serif" font-size="16" fill="#d4a060" text-anchor="middle" letter-spacing="6" font-weight="700" opacity="0.9">LONDON'S PREMIER SPECIALTY</text>

  <!-- Main logo -->
  <text x="600" y="330" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" fill="#fdf6ec" text-anchor="middle" letter-spacing="-4">4</text>
  <text x="700" y="330" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="-4">ever</text>

  <!-- Coffee text -->
  <text x="600" y="395" font-family="Georgia,serif" font-size="38" fill="#78716c" text-anchor="middle" letter-spacing="18" font-weight="400">COFFEE</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" fill="#57534e" text-anchor="middle" letter-spacing="1">Single-Origin Beans · Expert Craft · Free Delivery Over £30</text>

  <!-- Bottom bar -->
  <rect x="0" y="568" width="1200" height="62" fill="#0d0603" opacity="0.8"/>
  <text x="600" y="606" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="#44403c" text-anchor="middle" letter-spacing="2">4ever-roastery.vercel.app</text>

  <!-- Star rating -->
  <text x="420" y="520" font-family="sans-serif" font-size="22" fill="#d4a060" text-anchor="middle">★★★★★</text>
  <text x="420" y="545" font-family="sans-serif" font-size="14" fill="#44403c" text-anchor="middle">4.8 · 2,134 reviews</text>

  <text x="780" y="520" font-family="sans-serif" font-size="22" fill="#d4a060" text-anchor="middle">☕</text>
  <text x="780" y="545" font-family="sans-serif" font-size="14" fill="#44403c" text-anchor="middle">Free delivery · 18 min avg</text>
</svg>
